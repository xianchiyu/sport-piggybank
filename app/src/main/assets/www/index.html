<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>运动存钱罐</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="violationModal" class="modal">
<div class="modal-content">
<div class="modal-title">⚠️ 发现违规</div>
<div id="violationList" class="violation-list"></div>
<button class="btn-primary" onclick="closeViolationModal()">知道了</button>
</div>
</div>

<div id="exerciseModal" class="modal">
<div class="modal-content">
<div class="modal-title">运动打卡</div>
<div class="ex-type">
<button class="ex-opt active" data-type="run" onclick="selectExType('run')">跑步</button>
<button class="ex-opt" data-type="walk" onclick="selectExType('walk')">走路</button>
</div>
<div class="ex-duration">
<button class="ex-dur" data-dur="10" onclick="selectExDur(10)">10分钟</button>
<button class="ex-dur" data-dur="20" onclick="selectExDur(20)">20分钟</button>
<button class="ex-dur active" data-dur="30" onclick="selectExDur(30)">30分钟</button>
</div>
<div class="ex-distance" id="exDistanceWrap">
<label>跑步距离(km) ≥3额外+5铜</label>
<input type="number" id="exDistance" placeholder="如 4" step="0.1" min="0">
</div>
<button class="btn-primary" onclick="doExerciseCheckin()">确认打卡</button>
<button class="btn-cancel" onclick="closeExercise()">取消</button>
</div>
</div>

<div id="toast" class="toast"></div>

<div id="page-home" class="page active">
<div class="date" id="todayDate"></div>

<button class="checkin-btn" id="btnExercise" onclick="openExercise()">
<span class="btn-icon">🏃</span>
<span class="btn-label">运动</span>
<span class="btn-streak" id="streakExercise"></span>
</button>

<button class="checkin-btn" id="btnBreakfast" onclick="quickCheckin('breakfast')">
<span class="btn-icon">🍳</span>
<span class="btn-label">早餐</span>
<span class="btn-streak" id="streakBreakfast"></span>
</button>

<button class="checkin-btn" id="btnDinner" onclick="quickCheckin('dinner')">
<span class="btn-icon">🍽️</span>
<span class="btn-label">晚餐</span>
<span class="btn-streak" id="streakDinner"></span>
</button>

<div class="section piggy-section">
<div class="piggy-wrapper">
<img src="piggy.png" class="piggy-img" alt="存钱罐">
<div class="coin-layer" id="coinLayer"></div>
</div>
<div class="piggy-coins">
<span class="coin-text gold">金 <span id="goldCount">0</span></span>
<span class="coin-text silver">银 <span id="silverCount">0</span></span>
<span class="coin-text copper">铜 <span id="copperCount">0</span></span>
</div>
<div class="piggy-yuan" id="totalYuan">¥0.0</div>
</div>

<div class="section">
<div class="section-title">今日记录</div>
<div id="todayLog" class="log-list"></div>
</div>
</div>

<div id="page-ledger" class="page">
<div class="section">
<div class="section-title">季度统计</div>
<div class="quarter-stats">
<div class="stat"><span class="stat-label">总收入</span><span class="stat-val" id="qIncomeCopper">0铜</span></div>
<div class="stat"><span class="stat-label">总支出</span><span class="stat-val" id="qExpenseCopper">0铜</span></div>
<div class="stat highlight"><span class="stat-label">余额</span><span class="stat-val" id="qBalanceCopper">0铜</span></div>
</div>
<div class="piggy-coins ledger-coins">
<span class="coin-text gold">金 <span id="ledgerGold">0</span></span>
<span class="coin-text silver">银 <span id="ledgerSilver">0</span></span>
<span class="coin-text copper">铜 <span id="ledgerCopper">0</span></span>
</div>
</div>

<div class="section">
<div class="section-title">消费扣币</div>
<input type="text" id="expenseName" placeholder="买了什么" class="input">
<div class="consume-amount-row">
<input type="number" id="expenseAmount" placeholder="金额(元)" class="input amount-input" step="0.1" min="0">
<span class="copper-eq" id="copperEq">= 0铜</span>
</div>
<button class="btn-primary" onclick="doConsume()">扣币</button>
</div>

<div class="section">
<div class="section-title">收支明细</div>
<div id="txnList" class="log-list"></div>
</div>

<div class="section">
<div class="section-title">季度提现</div>
<button class="btn-primary" onclick="doQuarterWithdraw()">生成报告并清零</button>
</div>
</div>

<div id="page-settings" class="page">
<div class="section">
<div class="section-title">城市选择</div>
<select id="citySelect" class="input" onchange="doSetCity()">
<option value="beijing">北京</option>
<option value="shanghai">上海</option>
<option value="guangzhou">广州</option>
<option value="shenzhen">深圳</option>
<option value="hangzhou">杭州</option>
<option value="nanjing">南京</option>
<option value="chengdu">成都</option>
<option value="wuhan">武汉</option>
<option value="xian">西安</option>
<option value="qingdao">青岛</option>
</select>
</div>

<div class="section">
<div class="section-title">提醒</div>
<div class="setting-row"><span>早餐 7:30</span><span class="hint">已开启</span></div>
<div class="setting-row"><span>晚餐 19:30</span><span class="hint">已开启</span></div>
<div class="setting-row"><span>运动 20:00</span><span class="hint">已开启</span></div>
</div>

<div class="section">
<div class="section-title">违规管理</div>
<div class="setting-row"><span>下次罚金</span><span id="penNext" class="warn">¥10</span></div>
<div class="setting-row"><span>已违规</span><span id="penCount">0次</span></div>
<div class="setting-row"><span>周期剩余</span><span id="penDays">15天</span></div>
<div class="violation-btns" style="margin-top:12px">
<button class="btn-warn" onclick="doReportViolation('exercise','晴天未运动')">运动违规</button>
<button class="btn-warn" onclick="doReportViolation('breakfast','未做早餐')">早餐违规</button>
<button class="btn-warn" onclick="doReportViolation('dinner','晚餐违规')">晚餐违规</button>
</div>
</div>

<div class="section">
<div class="section-title">社交豁免</div>
<div class="setting-row"><span>本月已用</span><span id="socUsed">0/3</span></div>
<button class="btn-small" onclick="doSocialExempt()" style="margin-top:8px">使用社交豁免</button>
</div>
</div>

<nav class="tabbar">
<div class="tab active" onclick="switchPage('home')" id="tab-home">主页</div>
<div class="tab" onclick="switchPage('ledger')" id="tab-ledger">账本</div>
<div class="tab" onclick="switchPage('settings')" id="tab-settings">设置</div>
</nav>

<script src="app.js"></script>
</body>
</html>
